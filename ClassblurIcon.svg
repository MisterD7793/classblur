      C306 267 392 182 512 182
      C621 182 681 235 743 248
      C719 311 649 338 553 335
      C465 332 397 305 342 270
      C326 303 306 339 292 390
      Z"/>

    <path fill="#FFFFFF" d="M332 342
      C399 285 488 317 566 317
      C637 317 691 296 733 253
      C720 315 653 358 540 358
      C452 358 391 334 342 300
      C339 313 336 327 332 342
      Z"/>

    <!-- Clean lower edge of hairline -->
    <path fill="#FFFFFF" d="M342 300
      C390 334 452 358 540 358
      C653 358 720 315 733 253
      C698 319 625 386 482 356
      C418 343 374 321 342 300
      Z"/>
  </g>
</svg>
